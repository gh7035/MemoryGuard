name: Release MemoryGuard

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app bundle
        run: ./build_app.sh

      - name: Archive app bundle
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          zip -r "MemoryGuard-${VERSION}.zip" "MemoryGuard.app"
          shasum -a 256 "MemoryGuard-${VERSION}.zip" > "MemoryGuard-${VERSION}.zip.sha256"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: memoryguard-release
          path: |
            MemoryGuard-*.zip
            MemoryGuard-*.zip.sha256

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MemoryGuard-*.zip
            MemoryGuard-*.zip.sha256
